<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Sophie</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background:#f5f7fa; color:#333; display:flex; justify-content:center;
         align-items:center; min-height:100vh; }
  .container { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.1);
               padding:40px; max-width:480px; width:100%; text-align:center; }
  h1 { margin:0 0 8px; font-size:1.6rem; }
  .subtitle { color:#666; margin:0 0 24px; font-size:.95rem; }
  #callBtn { background:#22c55e; color:#fff; border:none; border-radius:50%;
             width:80px; height:80px; font-size:2rem; cursor:pointer;
             transition:all .2s; display:inline-flex; align-items:center;
             justify-content:center; }
  #callBtn:hover { background:#16a34a; transform:scale(1.05); }
  #callBtn.active { background:#ef4444; }
  #callBtn.active:hover { background:#dc2626; }
  #callBtn:disabled { background:#9ca3af; cursor:not-allowed; transform:none; }
  .timer { font-size:1.1rem; color:#666; margin:12px 0 0; min-height:1.5em; }
  .mic-indicator { display:none; align-items:center; justify-content:center;
                   gap:6px; margin:12px 0; color:#22c55e; font-size:.9rem; }
  .mic-indicator.listening { display:flex; }
  .mic-dot { width:10px; height:10px; background:#22c55e; border-radius:50%;
             animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .transcript { text-align:left; margin:20px 0 0; max-height:360px;
                overflow-y:auto; border:1px solid #e5e7eb; border-radius:8px;
                padding:12px; font-size:.9rem; line-height:1.5; }
  .msg { margin:6px 0; padding:8px 12px; border-radius:8px; }
  .msg.caller { background:#eff6ff; }
  .msg.agent { background:#f0fdf4; }
  .msg .role { font-weight:600; font-size:.8rem; text-transform:uppercase;
               color:#666; margin-bottom:2px; }
  .text-fallback { display:none; margin:16px 0 0; }
  .text-fallback.active { display:flex; gap:8px; }
  .text-fallback input { flex:1; padding:10px 14px; border:1px solid #d1d5db;
                         border-radius:8px; font-size:.95rem; }
  .text-fallback button { padding:10px 20px; background:#3b82f6; color:#fff;
                          border:none; border-radius:8px; cursor:pointer;
                          font-size:.95rem; }
  .text-fallback button:hover { background:#2563eb; }
  .status { font-size:.85rem; color:#888; margin:8px 0 0; min-height:1.2em; }
</style>
</head>
<body>
<div class="container">
  <h1>Call Sophie</h1>
  <p class="subtitle">Your personal AI assistant</p>

  <button id="callBtn" title="Start call">&#128222;</button>
  <div class="timer" id="timer"></div>
  <div class="mic-indicator" id="micIndicator">
    <span class="mic-dot"></span> Listening&hellip;
  </div>
  <div class="status" id="status"></div>

  <div class="text-fallback" id="textFallback">
    <input type="text" id="textInput" placeholder="Type your message&hellip;"
           autocomplete="off" />
    <button id="textSend">Send</button>
  </div>

  <div class="transcript" id="transcript" style="display:none"></div>
</div>

<script>
(function() {
  const callBtn    = document.getElementById('callBtn');
  const timerEl    = document.getElementById('timer');
  const micInd     = document.getElementById('micIndicator');
  const statusEl   = document.getElementById('status');
  const transcEl   = document.getElementById('transcript');
  const textFb     = document.getElementById('textFallback');
  const textInput  = document.getElementById('textInput');
  const textSend   = document.getElementById('textSend');

  let ws = null;
  let recognition = null;
  let synth = window.speechSynthesis || null;
  let timerInterval = null;
  let startTime = 0;
  let inCall = false;
  let speechSupported = false;
  let synthSupported = !!(synth && synth.speak);

  // Feature detection
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    speechSupported = true;
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function appendMsg(role, text) {
    transcEl.style.display = 'block';
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'You' ? 'caller' : 'agent');
    const roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = role;
    const textEl = document.createElement('div');
    textEl.textContent = text;
    div.appendChild(roleEl);
    div.appendChild(textEl);
    transcEl.appendChild(div);
    transcEl.scrollTop = transcEl.scrollHeight;
  }

  function updateTimer() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    timerEl.textContent = m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function speakText(text) {
    if (synthSupported && synth) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1;
      utter.onend = function() { startListening(); };
      synth.speak(utter);
    } else {
      // Fallback: fetch from server TTS
      fetch('/api/tts/speak', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
      }).then(function(r) {
        if (r.ok) return r.blob();
        startListening();
        return null;
      }).then(function(blob) {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = function() { startListening(); URL.revokeObjectURL(url); };
        audio.play();
      }).catch(function() { startListening(); });
    }
  }

  function startListening() {
    if (!inCall) return;
    if (speechSupported && recognition) {
      try { recognition.start(); } catch(e) {}
      micInd.classList.add('listening');
    }
  }

  function stopListening() {
    micInd.classList.remove('listening');
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
    }
  }

  function endCall() {
    inCall = false;
    stopListening();
    if (synth) synth.cancel();
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({type: 'call_end'}));
      ws.close();
    }
    ws = null;
    callBtn.classList.remove('active');
    callBtn.innerHTML = '&#128222;';
    callBtn.title = 'Start call';
    textFb.classList.remove('active');
    setStatus('Call ended');
  }

  function startCall() {
    transcEl.innerHTML = '';
    transcEl.style.display = 'none';
    setStatus('Connecting...');
    callBtn.disabled = true;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/call');

    ws.onopen = function() {
      inCall = true;
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
      callBtn.disabled = false;
      callBtn.classList.add('active');
      callBtn.innerHTML = '&#128308;';
      callBtn.title = 'End call';
      setStatus('Connected');

      ws.send(JSON.stringify({type: 'call_start', caller: 'web-caller'}));

      // Show text fallback if no speech recognition
      if (!speechSupported) {
        textFb.classList.add('active');
        setStatus('Speech recognition unavailable — type your messages');
      }
    };

    ws.onmessage = function(ev) {
      var msg;
      try { msg = JSON.parse(ev.data); } catch(e) { return; }

      if (msg.type === 'greeting' || msg.type === 'agent_reply') {
        stopListening();
        appendMsg('Sophie', msg.text);
        if (msg.call_complete) {
          speakText(msg.text);
          setTimeout(endCall, 3000);
        } else {
          speakText(msg.text);
        }
      } else if (msg.type === 'turn_limit') {
        stopListening();
        appendMsg('Sophie', msg.text);
        speakText(msg.text);
        setTimeout(endCall, 3000);
      } else if (msg.type === 'call_ended') {
        endCall();
      } else if (msg.type === 'error') {
        setStatus('Error: ' + msg.text);
      }
    };

    ws.onerror = function() { setStatus('Connection error'); };
    ws.onclose = function() {
      if (inCall) endCall();
    };
  }

  // Set up speech recognition
  if (speechSupported) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = function(ev) {
      const text = ev.results[0][0].transcript;
      micInd.classList.remove('listening');
      if (text && ws && ws.readyState === WebSocket.OPEN) {
        appendMsg('You', text);
        ws.send(JSON.stringify({type: 'speech', text: text}));
      }
    };

    recognition.onerror = function(ev) {
      micInd.classList.remove('listening');
      if (ev.error !== 'no-speech' && ev.error !== 'aborted') {
        // Fall back to text input
        textFb.classList.add('active');
        setStatus('Mic error — type your messages instead');
      }
    };

    recognition.onend = function() {
      micInd.classList.remove('listening');
    };
  }

  // Text fallback send
  function sendText() {
    var text = textInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    appendMsg('You', text);
    ws.send(JSON.stringify({type: 'speech', text: text}));
    textInput.value = '';
  }
  textSend.addEventListener('click', sendText);
  textInput.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') sendText();
  });

  // Call button
  callBtn.addEventListener('click', function() {
    if (inCall) { endCall(); } else { startCall(); }
  });
})();
</script>
</body>
</html>
